name: Release WordPress plugin

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version from plugin source
        id: vars
        shell: bash
        run: |
          PLUGIN_FILE="kaigen-connector.php"
          VERSION="$(sed -n 's/^[[:space:]]*\\*[[:space:]]*Version:[[:space:]]*\\(.*\\)$/\\1/p' "$PLUGIN_FILE" | head -n 1 | tr -d '\r')"

          if [ -z "$VERSION" ]; then
            echo "Failed to read plugin version from $PLUGIN_FILE" >&2
            exit 1
          fi

          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare package directory
        shell: bash
        run: |
          mkdir -p build/kaigen-connector

          rsync -av ./ build/kaigen-connector/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'build/' \
            --exclude 'node_modules/' \
            --exclude 'tests/' \
            --exclude '.DS_Store'

      - name: Align readme stable tag in build
        shell: bash
        run: |
          README_FILE="build/kaigen-connector/readme.txt"

          if [ -f "$README_FILE" ]; then
            sed -i -E "s/^(Stable tag:[[:space:]]*).*/\\1${{ steps.vars.outputs.version }}/" "$README_FILE" || true
          fi

      - name: Build zip
        shell: bash
        run: |
          cd build
          zip -r kaigen-connector.zip kaigen-connector

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.vars.outputs.tag }}" \
            "build/kaigen-connector.zip#Kaigen Connector" \
            --title "Kaigen Connector ${{ steps.vars.outputs.version }}" \
            --notes "Automatic release for commit ${GITHUB_SHA}"
